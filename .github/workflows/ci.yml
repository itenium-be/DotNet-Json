name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Itenium.Json.slnx

      - name: Build
        run: dotnet build Itenium.Json.slnx --no-restore

      - name: Test
        run: dotnet test Itenium.Json.slnx --no-build --verbosity normal
